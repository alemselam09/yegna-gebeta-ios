name: Build iOS IPA for Yegna Gebeta (No Signing)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App without Signing
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Create iOS project
        run: briefcase create iOS

      - name: Build iOS app (no signing)
        run: briefcase build iOS

      # የ .app ፋይሉን ቦታ ማወቅ
      - name: Find .app bundle
        id: find_app
        run: |
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "App found at: $APP_PATH"
            echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          else
            echo "App bundle not found!"
            exit 1
          fi

      # የ .ipa ፋይል መፍጠር (ከFlutter ዘዴ ጋር ተመሳሳይ)
      - name: Create IPA from .app
        run: |
          mkdir -p Payload
          cp -r "${{ steps.find_app.outputs.app_path }}" Payload/
          zip -qq -r -9 YegnaGebeta.ipa Payload
        working-directory: ${{ github.workspace }}

      # ማረሚያ፦ የተፈጠረውን ፋይል ማረጋገጥ
      - name: Verify IPA creation
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "Checking for IPA file:"
          find . -name "*.ipa" -type f

      # የተገኘውን .ipa ፋይል መጫን
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: YegnaGebeta.ipa
          path: "**/*.ipa"
          if-no-files-found: error
