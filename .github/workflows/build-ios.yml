name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Create iOS project
        run: briefcase create iOS

      - name: Build iOS app
        run: briefcase build iOS

      - name: Package iOS app (create .ipa)
        run: briefcase package iOS -u --adhoc-sign

      # ማረሚያ: .ipa ፋይሉን ለማግኘት (አማራጭ ነገር ግን ጠቃሚ)
      - name: Find IPA file
        run: |
          echo "Searching for .ipa file..."
          find . -name "*.ipa" -type f

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: YegnaGebeta.ipa
          path: "**/*.ipa"
          if-no-files-found: error
