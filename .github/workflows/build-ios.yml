name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Build iOS app
        run: |
          py -m briefcase create iOS
          py -m briefcase build iOS
          py -m briefcase package iOS

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: YegnaGebeta.ipa
          path: iOS/build/YegnaGebeta.ipa
